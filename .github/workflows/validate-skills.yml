name: Validate Copilot Skills (PR)

on:
  pull_request:
    paths:
      - "skills/**"
      - "agents/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  frontmatter-validation:
    name: Frontmatter Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate YAML frontmatter
        run: ./scripts/validate-frontmatter.sh

  line-budget:
    name: Line Budget Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check line budgets
        run: ./scripts/check-line-budget.sh

  structure-check:
    name: Structure Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required sections
        run: ./scripts/check-structure.sh

  reference-check:
    name: Reference & Contract File Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify REFERENCE.md exists alongside every SKILL.md
        run: |
          EXIT_CODE=0
          while IFS= read -r -d '' skill_file; do
            dir=$(dirname "$skill_file")
            if [ ! -f "${dir}/REFERENCE.md" ]; then
              echo "::error::Missing REFERENCE.md in ${dir}/"
              EXIT_CODE=1
            fi
          done < <(find skills -name 'SKILL.md' -print0 2>/dev/null || true)

          # Check CONTRACT.md for multi-platform skills
          for skill_root in skills/*/; do
            [ -d "$skill_root" ] || continue
            has_platform=false
            for subdir in "$skill_root"*/; do
              [ -d "$subdir" ] || continue
              if [ -f "${subdir}SKILL.md" ]; then
                has_platform=true
                break
              fi
            done
            if [ "$has_platform" = true ] && [ ! -f "${skill_root}CONTRACT.md" ]; then
              echo "::error::Missing CONTRACT.md in ${skill_root}"
              EXIT_CODE=1
            fi
          done

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "All skill directories contain REFERENCE.md; multi-platform skills have CONTRACT.md"
          fi
          exit "$EXIT_CODE"

  codeblock-check:
    name: Code Block Size Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check code block sizes
        run: ./scripts/check-codeblock-size.sh

  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get changed files
        id: changed
        run: |
          FILES=$(gh pr diff "${{ github.event.pull_request.number }}" --name-only | grep '\.md$' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run markdownlint on changed files
        if: steps.changed.outputs.files != ''
        run: |
          echo "${{ steps.changed.outputs.files }}" | xargs npx markdownlint-cli2

  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan for common secret patterns
        run: |
          EXIT_CODE=0
          PATTERNS=(
            'AKIA[0-9A-Z]{16}'                          # AWS Access Key
            '(?i)(api[_-]?key|apikey)\s*[:=]\s*["\x27]?[A-Za-z0-9_\-]{16,}'  # API keys
            '(?i)(password|passwd|pwd)\s*[:=]\s*["\x27]?[^\s"'\'']{8,}'       # Passwords
            '(?i)(secret|token)\s*[:=]\s*["\x27]?[A-Za-z0-9_\-]{16,}'        # Secrets/tokens
            '-----BEGIN (RSA |EC |DSA )?PRIVATE KEY-----'                      # Private keys
            'ghp_[A-Za-z0-9]{36}'                        # GitHub PAT
            'xox[bprs]-[A-Za-z0-9\-]+'                   # Slack tokens
          )

          for pattern in "${PATTERNS[@]}"; do
            MATCHES=$(grep -rPn "$pattern" skills/ agents/ 2>/dev/null || true)
            if [ -n "$MATCHES" ]; then
              echo "::error::Potential secret found matching pattern: $pattern"
              echo "$MATCHES"
              EXIT_CODE=1
            fi
          done

          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "No secret patterns detected."
          fi
          exit "$EXIT_CODE"
